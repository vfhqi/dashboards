<title>Pillar Tree — New Taxonomy V8 (30-Apr-26)</title>
<style>

* { margin:0; padding:0; box-sizing:border-box; }
html, body { min-height:100%; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#fafaf8; color:#1a1a1a; padding:8px 14px 16px 14px; }

/* === HEADER ROW === */
.headbar { display:flex; align-items:center; gap:18px; margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid #e0e0e0; }
.head-l { flex:0 0 auto; }
.head-l h1 { font-size:14px; font-weight:700; line-height:1.1; }
.head-l .subtitle { font-size:10px; color:#999; }
.head-m { flex:1 1 auto; display:flex; justify-content:center; gap:14px; flex-wrap:wrap; align-items:center; }
.head-r { flex:0 0 auto; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; align-items:center; font-size:10.5px; color:#666; }
.head-r .lp { font-size:9px; padding:1px 5px; border-radius:5px; display:inline-block; font-weight:700; margin-right:2px; }

.btn-group { display:flex; gap:3px; align-items:center; }
.btn-group-label { font-size:9.5px; color:#888; margin-right:2px; text-transform:uppercase; letter-spacing:0.5px; }
.depth-btn, .len-btn { font-size:10.5px; padding:2px 9px; border:1px solid #ddd; border-radius:5px; background:#fff; color:#666; cursor:pointer; font-family:inherit; transition:background 0.15s, border-color 0.15s; }
.depth-btn:hover, .len-btn:hover { background:#f5f5f5; }
.depth-btn.active, .len-btn.active { background:#e6f1fb; color:#185fa5; border-color:#85b7eb; }

#tree { width:100%; }

.top-row { display:flex; flex-direction:column; align-items:stretch; gap:24px; width:100%; }
.pillar-section { width:100%; padding-bottom:8px; }
.pillar-divider { border:none; border-top:1px solid #e8e8e4; margin:0; }

/* Default vertical drop (Pillar 2) */
.v-drop { position:relative; padding-left:22px; margin-top:1px; }
.v-drop::before { content:''; position:absolute; left:10px; top:0; bottom:var(--vd-rail-bottom, 12px); width:1.5px; background:#999; }
.v-drop-child { display:flex; align-items:flex-start; position:relative; padding:2px 0; }
.v-drop-child::before { content:''; position:absolute; left:-12px; top:var(--vd-arm-y, 14px); width:12px; height:1.5px; background:#999; }

/* INDENTED vertical drop — used inside RA in Pillar 1 only.
 * The CQ column starts at ~32px from the RA's left edge — past the "RA1" badge column,
 * so the CQ pills appear in the column where the RA's text begins.
 * The vertical rail is at left:24px (centred on the text-column gutter), the arms are 8px stubs.
 */
.v-drop.v-drop-indent { padding-left:36px; margin-top:2px; }
.v-drop.v-drop-indent::before { left:28px; top:0; bottom:var(--vd-rail-bottom, 12px); width:1.5px; background:#999; }
.v-drop.v-drop-indent > .v-drop-child::before { left:-8px; top:var(--vd-arm-y, 14px); width:8px; height:1.5px; background:#999; }

/* Pillar-to-children stem */
.pillar-stem { width:1.5px; height:14px; background:#999; margin-left:var(--stem-left, 24px); }

/* Horizontal spread */
.h-spread { display:flex; flex-direction:row; flex-wrap:nowrap; align-items:flex-start; position:relative; margin-top:0; padding:0; width:100%; }
.h-spread-bar { position:absolute; height:1.5px; background:#999; }
.h-spread-child { display:flex; flex-direction:column; align-items:stretch; position:relative; padding-top:var(--child-pad-top, 18px); flex:1 1 0; min-width:0; }
.h-spread-child::before { content:''; position:absolute; top:0; left:var(--child-rail-x, 24px); width:1.5px; height:var(--child-rail-h, 18px); background:#999; }

.h-spread .h-spread-child { padding-right:14px; }
.h-spread .h-spread-child:last-child { padding-right:0; }

.block { display:flex; flex-direction:column; align-items:flex-start; min-width:0; width:100%; }
.node-label { display:flex; align-items:flex-start; gap:4px; padding:2px 0; min-height:22px; min-width:0; }

.num { display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; background:#888; border-radius:3px; padding:1px 4px; min-width:16px; text-align:center; flex-shrink:0; margin-top:2px; }
.num-g { background:#085041; }
.num-e { background:#633806; }
.num-ra { background:#0C447C; }
.num-cq { background:#666; }

.pill { display:inline; font-size:11px; font-weight:600; padding:2px 8px; border-radius:5px; line-height:1.45; word-wrap:break-word; overflow-wrap:break-word; hyphens:auto; }
.pill u { text-decoration-thickness:1.2px; text-underline-offset:1.5px; }

.pill-pillar { background:#EEEDFE; color:#3C3489; font-size:13px; padding:3px 10px; font-weight:700; }
.pill-group  { background:#E1F5EE; color:#085041; font-size:12px; }
.pill-element { background:#FAEEDA; color:#633806; font-size:11.5px; }
.pill-attr { background:#E6F1FB; color:#0C447C; font-size:10.5px; }
.pill-cq { background:#F1EFE8; color:#555; font-size:9.5px; font-weight:500; }

.pill-group.gc-positive-fit  { background:#FFF6D6; color:#7a5a00; }
.pill-group.gc-negative-fit  { background:#FBE2E4; color:#8a2a3a; }
.pill-element.ec-quality       { background:#E1F5EE; color:#0a5a3f; }
.pill-element.ec-positive-fit  { background:#FFF6D6; color:#7a5a00; }
.pill-element.ec-negative-fit  { background:#FBE2E4; color:#8a2a3a; }

/* Length toggle */
body.len-short .label-long  { display:none; }
body.len-long  .label-short { display:none; }


/* V9: tier-aware vertical spacing — applies to both pillars */
.v-drop[data-tier="element"] > .v-drop-child { padding:10px 0; }
.v-drop[data-tier="ra"]      > .v-drop-child { padding:6px 0; }
.v-drop[data-tier="cq"]      > .v-drop-child { padding:2px 0; }

</style>

var currentDepth = "element";
var currentLen = "long";  /* V8: default to Long view on page open */

function setDepth(d) {
    currentDepth = d;
    var btns = document.querySelectorAll(".depth-btn");
    for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle("active", btns[i].getAttribute("data-d") === d);
    }
    render();
}

function setLen(l) {
    currentLen = l;
    document.body.classList.toggle("len-short", l === "short");
    document.body.classList.toggle("len-long", l === "long");
    var btns = document.querySelectorAll(".len-btn");
    for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle("active", btns[i].getAttribute("data-l") === l);
    }
    setTimeout(fixConnectors, 50);
    setTimeout(fixConnectors, 200);
}

function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

function labelHtml(longText, shortText, underlineWords) {
    var safeLong = esc(longText);
    if (underlineWords && underlineWords.length > 0) {
        var words = longText.split(/(\s+)/);
        var wordIdx = -1;
        var assembled = "";
        var underlineSet = {};
        for (var k = 0; k < underlineWords.length; k++) underlineSet[underlineWords[k]] = true;
        for (var i = 0; i < words.length; i++) {
            if (/\S/.test(words[i])) {
                wordIdx++;
                if (underlineSet[wordIdx]) {
                    assembled += '<u>' + esc(words[i]) + '<\/u>';
                } else {
                    assembled += esc(words[i]);
                }
            } else {
                assembled += esc(words[i]);
            }
        }
        safeLong = assembled;
    }
    var safeShort = esc(shortText || longText);
    return '<span class="label-long">' + safeLong + '<\/span>' +
           '<span class="label-short">' + safeShort + '<\/span>';
}

function renderCQ(cq, num) {
    return '<div class="node-label"><span class="num num-cq">CQ' + num + '<\/span><span class="pill pill-cq">' + esc(cq) + '<\/span><\/div>';
}

/* RA renderer with cqMode flag.
 * cqMode "indented" (Pillar 1): RA pill on its own row, then CQs vertically below in an indented v-drop
 *   (the v-drop has class .v-drop-indent so its rail/arms anchor past the RA1 badge column).
 * cqMode "vertical" (Pillar 2): same as before — standard v-drop directly under the RA.
 */
function renderAttr(attr, showCq, raNum, cqMode) {
    var label = labelHtml(attr.attr, attr.attr_short || attr.attr, attr.attr_underline);
    var raLabel = '<div class="node-label"><span class="num num-ra">RA' + raNum + '<\/span><span class="pill pill-attr">' + label + '<\/span><\/div>';

    if (!showCq || !attr.cqs || attr.cqs.length === 0) {
        return '<div class="block">' + raLabel + '<\/div>';
    }

    var dropCls = (cqMode === "indented") ? "v-drop v-drop-indent" : "v-drop";

    var h = '<div class="block">';
    h += raLabel;
    h += '<div class="' + dropCls + '" data-tier="cq">';
    for (var c = 0; c < attr.cqs.length; c++) {
        h += '<div class="v-drop-child">';
        h += renderCQ(attr.cqs[c], c + 1);
        h += '<\/div>';
    }
    h += '<\/div>';
    h += '<\/div>';
    return h;
}

function renderElement(elem, showAttr, showCq, elNum, cqMode) {
    var colourCls = elem.colour ? (' ' + elem.colour) : '';
    var label = labelHtml(elem.element, elem.element_short || elem.element, elem.element_underline);
    var h = '<div class="block">';
    h += '<div class="node-label"><span class="num num-e">E' + elNum + '<\/span><span class="pill pill-element' + colourCls + '">' + label + '<\/span><\/div>';
    if (showAttr && elem.attrs && elem.attrs.length > 0) {
        h += '<div class="v-drop" data-tier="ra">';
        for (var a = 0; a < elem.attrs.length; a++) {
            h += '<div class="v-drop-child">';
            h += renderAttr(elem.attrs[a], showCq, a + 1, cqMode);
            h += '<\/div>';
        }
        h += '<\/div>';
    }
    h += '<\/div>';
    return h;
}

function render() {
    var el = document.getElementById("tree");
    if (!el) return;
    var showEl = (currentDepth !== "group");
    var showAttr = (currentDepth === "attr" || currentDepth === "cq");
    var showCq = (currentDepth === "cq");

    var h = "";
    h += '<div class="top-row">';

    for (var s = 0; s < TREE.length; s++) {
        var section = TREE[s];
        if (s > 0) h += '<hr class="pillar-divider">';

        /* CQ render mode: Pillar 1 uses indented vertical drop; Pillar 2 uses standard vertical. */
        var cqMode = (s === 0) ? "indented" : "vertical";

        h += '<div class="pillar-section">';
        var pillarLabel = labelHtml(section.pillar, section.pillar_short || section.pillar, section.pillar_underline);
        h += '<div class="node-label"><span class="pill pill-pillar">' + pillarLabel + '<\/span><\/div>';

        var hasGroups = false;
        for (var gg = 0; gg < section.groups.length; gg++) {
            if (section.groups[gg].group !== "") { hasGroups = true; break; }
        }
        var showChildren = hasGroups ? true : showEl;

        if (showChildren) {
            h += '<div class="pillar-stem"><\/div>';
            if (!hasGroups) {
                var allElems = [];
                for (var g = 0; g < section.groups.length; g++) {
                    for (var e = 0; e < section.groups[g].elements.length; e++) {
                        allElems.push(section.groups[g].elements[e]);
                    }
                }
                h += '<div class="h-spread h-spread-ic" data-hs="1">';
                for (var e2 = 0; e2 < allElems.length; e2++) {
                    h += '<div class="h-spread-child">';
                    h += renderElement(allElems[e2], showAttr, showCq, e2 + 1, cqMode);
                    h += '<\/div>';
                }
                h += '<\/div>';
            } else {
                var gNum = 0;
                h += '<div class="h-spread h-spread-bb" data-hs="1">';
                for (var g = 0; g < section.groups.length; g++) {
                    var group = section.groups[g];
                    if (group.group === "") continue;
                    gNum++;
                    var groupCls = group._group_class ? (' ' + group._group_class) : '';
                    var groupLabel = labelHtml(group.group, group.group_short || group.group, group.group_underline);
                    h += '<div class="h-spread-child">';
                    h += '<div class="block">';
                    h += '<div class="node-label"><span class="num num-g">G' + gNum + '<\/span><span class="pill pill-group' + groupCls + '">' + groupLabel + '<\/span><\/div>';
                    if (showEl) {
                        h += '<div class="v-drop" data-tier="element">';
                        var elNum = 0;
                        for (var ee = 0; ee < group.elements.length; ee++) {
                            elNum++;
                            h += '<div class="v-drop-child">';
                            h += renderElement(group.elements[ee], showAttr, showCq, elNum, cqMode);
                            h += '<\/div>';
                        }
                        h += '<\/div>';
                    }
                    h += '<\/div>';
                    h += '<\/div>';
                }
                h += '<\/div>';
            }
        }
        h += '<\/div>';
    }

    h += '<\/div>';
    el.innerHTML = h;

    requestAnimationFrame(function() {
        requestAnimationFrame(function() { fixConnectors(); });
    });
    setTimeout(fixConnectors, 50);
    setTimeout(fixConnectors, 200);
    setTimeout(fixConnectors, 600);
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function() { fixConnectors(); });
    }
}

function fixConnectors() {
    /* Per-child rails for h-spread */
    var children = document.querySelectorAll(".h-spread-child");
    for (var i = 0; i < children.length; i++) {
        var child = children[i];
        var pill = child.querySelector(":scope > .block > .node-label > .pill");
        if (!pill) continue;
        var childRect = child.getBoundingClientRect();
        var pillRect = pill.getBoundingClientRect();
        var railX = (pillRect.left - childRect.left) + (pillRect.width / 2);
        var railH = (pillRect.top - childRect.top);
        if (railH < 4) railH = 4;
        child.style.setProperty("--child-rail-x", railX + "px");
        child.style.setProperty("--child-rail-h", railH + "px");
    }

    /* Horizontal bars + stem alignment */
    var spreads = document.querySelectorAll(".h-spread[data-hs]");
    for (var i2 = 0; i2 < spreads.length; i2++) {
        var sp = spreads[i2];
        var oldBars = sp.querySelectorAll(".h-spread-bar");
        for (var ob = 0; ob < oldBars.length; ob++) { oldBars[ob].parentNode.removeChild(oldBars[ob]); }
        var spChildren = sp.querySelectorAll(":scope > .h-spread-child");
        if (spChildren.length < 2) continue;
        var spRect = sp.getBoundingClientRect();
        var minLeft = Infinity, maxLeft = -Infinity;
        for (var c = 0; c < spChildren.length; c++) {
            var spc = spChildren[c];
            var spcPill = spc.querySelector(":scope > .block > .node-label > .pill");
            if (!spcPill) continue;
            var spcPillRect = spcPill.getBoundingClientRect();
            var connectorX = (spcPillRect.left - spRect.left) + (spcPillRect.width / 2);
            if (connectorX < minLeft) minLeft = connectorX;
            if (connectorX > maxLeft) maxLeft = connectorX;
        }
        if (minLeft === Infinity) continue;
        var bar = document.createElement("div");
        bar.className = "h-spread-bar";
        bar.style.top = "0px";
        bar.style.left = minLeft + "px";
        bar.style.width = (maxLeft - minLeft) + "px";
        sp.appendChild(bar);

        var psSection = sp.parentNode;
        if (psSection && psSection.classList && psSection.classList.contains("pillar-section")) {
            var psStem = psSection.querySelector(":scope > .pillar-stem");
            if (psStem) {
                var sectionRect = psSection.getBoundingClientRect();
                var minLeftAbs = spRect.left + minLeft;
                var stemLeftInSection = minLeftAbs - sectionRect.left;
                psStem.style.setProperty("--stem-left", stemLeftInSection + "px");
            }
        }
    }

    /* v-drop rails and arms — handles both .v-drop and .v-drop.v-drop-indent */
    var drops = document.querySelectorAll(".v-drop");
    for (var i3 = 0; i3 < drops.length; i3++) {
        var drop = drops[i3];
        var dropChildren = drop.querySelectorAll(":scope > .v-drop-child");
        if (dropChildren.length === 0) {
            drop.style.setProperty("--vd-rail-bottom", drop.offsetHeight + "px");
            continue;
        }
        for (var dc = 0; dc < dropChildren.length; dc++) {
            var dchild = dropChildren[dc];
            var dchildPill = dchild.querySelector(".pill");
            var armY;
            if (dchildPill) {
                var dchildRect = dchild.getBoundingClientRect();
                var dchildPillRect = dchildPill.getBoundingClientRect();
                armY = (dchildPillRect.top - dchildRect.top) + (dchildPillRect.height / 2);
            } else {
                armY = 14;
            }
            dchild.style.setProperty("--vd-arm-y", armY + "px");
        }
        var lastChild = dropChildren[dropChildren.length - 1];
        var lastPill = lastChild.querySelector(".pill");
        var dropHeight = drop.offsetHeight;
        var lastArmY;
        if (lastPill) {
            var lastChildRect = lastChild.getBoundingClientRect();
            var lastPillRect = lastPill.getBoundingClientRect();
            var dropRect = drop.getBoundingClientRect();
            lastArmY = (lastPillRect.top - dropRect.top) + (lastPillRect.height / 2);
        } else {
            lastArmY = lastChild.offsetTop + 14;
        }
        var bottomGap = dropHeight - lastArmY;
        if (bottomGap < 0) bottomGap = 0;
        drop.style.setProperty("--vd-rail-bottom", bottomGap + "px");
    }
}

function buildHeaderControls() {
    var headM = document.getElementById("head-m");
    var headR = document.getElementById("head-r");
    var mh = "";
    mh += '<div class="btn-group">';
    mh += '<span class="btn-group-label">Depth<\/span>';
    mh += '<button class="depth-btn" data-d="group" onclick="setDepth(\'group\')">Groups<\/button>';
    mh += '<button class="depth-btn active" data-d="element" onclick="setDepth(\'element\')">+ Elements<\/button>';
    mh += '<button class="depth-btn" data-d="attr" onclick="setDepth(\'attr\')">+ Required attributes<\/button>';
    mh += '<button class="depth-btn" data-d="cq" onclick="setDepth(\'cq\')">+ Core questions<\/button>';
    mh += '<\/div>';
    mh += '<div class="btn-group">';
    mh += '<span class="btn-group-label">Item length<\/span>';
    mh += '<button class="len-btn" data-l="short" onclick="setLen(\'short\')">Short<\/button>';
    mh += '<button class="len-btn active" data-l="long" onclick="setLen(\'long\')">Long<\/button>';
    mh += '<\/div>';
    headM.innerHTML = mh;

    var rh = "";
    rh += '<span><span class="lp pill-pillar">P<\/span> Pillar<\/span>';
    rh += '<span><span class="lp pill-group">G<\/span> Group<\/span>';
    rh += '<span><span class="lp pill-element">E<\/span> Element<\/span>';
    rh += '<span><span class="lp pill-attr">RA<\/span> Required attribute<\/span>';
    rh += '<span><span class="lp pill-cq">CQ<\/span> Core question<\/span>';
    headR.innerHTML = rh;
}

buildHeaderControls();
render();
window.addEventListener("resize", function() { fixConnectors(); });

</script>
</body>
</html>
